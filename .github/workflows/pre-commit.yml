name: pre-commit

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        default: '3.14'
        type: string
      autofix:
        required: false
        default: true
        type: boolean
      organization_domain:
        required: false
        default: 'github.com'
        type: string
      bot_username:
        required: false
        default: 'github-actions[bot]'
        type: string
      bot_email:
        required: false
        default: '41898282+github-actions[bot]@users.noreply.github.com'
        type: string
    secrets:
      bot_token:
        required: false
        description: 'Token used for committing fixes back to the PR. Falls back to GITHUB_TOKEN.'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.14'
        type: string
      autofix:
        description: 'Auto-commit fixes back to the PR'
        required: false
        default: true
        type: boolean
      organization_domain:
        description: 'GitHub Enterprise domain name. (If applicable)'
        required: false
        default: 'github.com'
        type: string
      bot_username:
        required: false
        default: 'github-actions[bot]'
        type: string
      bot_email:
        required: false
        default: '41898282+github-actions[bot]@users.noreply.github.com'
        type: string
    secrets:
      bot_token:
        required: false
        description: 'Token used for committing fixes back to the PR. Falls back to GITHUB_TOKEN.'

jobs:
  pre-commit:
    name: pre-commit

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.bot_token || secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: ${{ inputs.python_version }}

      - name: Setup Python
        run: |
          uv python install
          uv venv

      - name: Install pre-commit
        run: |
          uv pip install pre-commit==4.6.0

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py${{ inputs.python_version }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py${{ inputs.python_version }}-

      - name: Run pre-commit
        id: run_pre_commit
        run: |
          uv run pre-commit run --all-files --show-diff-on-failure
        continue-on-error: true

      - name: Check pre-commit status
        if: steps.run_pre_commit.outcome != 'success' && inputs.autofix == false
        run: exit 1

      - name: Commit changes
        if: steps.run_pre_commit.outcome != 'success' && inputs.autofix == true
        run: |
          rm -f uv.lock
          git config user.name ${{ inputs.bot_username }}
          git config user.email ${{ inputs.email }}
          git add -A
          git commit -m "[pre-commit] auto fixes"
          git push
